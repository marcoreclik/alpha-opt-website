<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>alphaOPT — Operations Consulting</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:        #080808;
      --surface:   #101010;
      --border:    rgba(255,255,255,0.07);
      --gold:      #c9a84c;
      --gold-dim:  rgba(201,168,76,0.15);
      --gold-glow: rgba(201,168,76,0.35);
      --white:     #f0ede8;
      --muted:     rgba(240,237,232,0.45);
      --font-display: 'Bebas Neue', sans-serif;
      --font-mono:    'DM Mono', monospace;
      --font-body:    'DM Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--white);
      font-family: var(--font-body);
      font-weight: 300;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ─── CANVAS ─────────────────────────────────────────── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.4;
      pointer-events: none;
    }

    .page-wrap {
      position: relative;
      z-index: 1;
    }

    /* ─── NAV ────────────────────────────────────────────── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 4rem;
      border-bottom: 1px solid transparent;
      transition: border-color 0.4s, background 0.4s, backdrop-filter 0.4s;
    }
    nav.scrolled {
      background: rgba(8,8,8,0.88);
      backdrop-filter: blur(18px);
      border-color: var(--border);
    }
    .nav-logo { height: 28px; display: flex; align-items: center; }
    .nav-logo img { height: 28px; filter: brightness(1.1); }
    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }
    .nav-links a {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--gold); }

    /* ─── LANG TOGGLE ────────────────────────────────────── */
    .nav-right {
      display: flex;
      align-items: center;
      gap: 1.2rem;
    }
    .lang-toggle {
      display: flex;
      align-items: center;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.14em;
    }
    .lang-toggle button {
      background: none;
      border: none;
      color: var(--muted);
      padding: 0.4rem 0.75rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
    .lang-toggle button.active {
      background: var(--gold);
      color: var(--bg);
    }
    .lang-toggle button:not(.active):hover {
      color: var(--white);
    }
    .nav-cta {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold);
      border: 1px solid var(--gold);
      padding: 0.5rem 1.2rem;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
      min-width: 130px;
      text-align: center;
      white-space: nowrap;
    }
    .nav-cta:hover { background: var(--gold); color: var(--bg); }

    /* ─── HERO ───────────────────────────────────────────── */
    #hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 4rem;
      position: relative;
      overflow: hidden;
    }
    .hero-tag {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 0.7s 0.2s forwards;
    }
    .hero-headline {
      font-family: var(--font-display);
      font-size: clamp(4rem, 10vw, 9rem);
      line-height: 0.92;
      letter-spacing: 0.04em;
      color: var(--white);
      opacity: 0;
      animation: fadeUp 0.8s 0.4s forwards;
      max-width: 14ch;
    }
    .hero-headline em { font-style: normal; color: var(--gold); }
    .hero-sub {
      margin-top: 2.5rem;
      font-size: 1rem;
      font-weight: 300;
      color: var(--muted);
      max-width: 40ch;
      line-height: 1.75;
      opacity: 0;
      animation: fadeUp 0.8s 0.6s forwards;
    }
    .hero-actions {
      margin-top: 3rem;
      display: flex;
      gap: 1.2rem;
      align-items: center;
      opacity: 0;
      animation: fadeUp 0.8s 0.8s forwards;
    }
    .btn-primary {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      background: var(--gold);
      color: var(--bg);
      padding: 0.9rem 2rem;
      text-decoration: none;
      font-weight: 500;
      transition: opacity 0.2s, transform 0.2s;
    }
    .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-ghost {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: color 0.2s;
    }
    .btn-ghost:hover { color: var(--white); }
    .btn-ghost::after { content: "→"; }
    .hero-logo-large {
      position: absolute;
      right: 4rem;
      top: 50%;
      transform: translateY(-50%);
      width: min(380px, 35vw);
      opacity: 0.06;
      pointer-events: none;
      animation: fadeIn 1.5s 1s forwards;
      filter: invert(0.9) sepia(1) saturate(0.4) hue-rotate(5deg);
    }
    .hero-scroll-hint {
      position: absolute;
      bottom: 3rem;
      left: 4rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-transform: uppercase;
      opacity: 0;
      animation: fadeIn 1s 1.2s forwards;
    }
    .scroll-line {
      width: 40px; height: 1px;
      background: var(--muted);
      animation: lineGrow 1s 1.4s both;
    }
    @keyframes lineGrow { from { width: 0 } to { width: 40px } }

    /* ─── SECTION BASE ───────────────────────────────────── */
    section { padding: 8rem 4rem; position: relative; }
    .section-label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1rem;
    }
    .section-title {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 5vw, 4.5rem);
      letter-spacing: 0.04em;
      line-height: 1;
      color: var(--white);
      margin-bottom: 3rem;
    }

    /* ─── STATS ──────────────────────────────────────────── */
    #stats {
      padding: 4rem;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .stat { padding: 2rem; border-right: 1px solid var(--border); }
    .stat:last-child { border-right: none; }
    .stat-num {
      font-family: var(--font-display);
      font-size: 3.5rem;
      letter-spacing: 0.04em;
      color: var(--gold);
      line-height: 1;
    }
    .stat-label {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.5rem;
    }

    /* ─── SERVICES ───────────────────────────────────────── */
    #services { padding: 8rem 4rem; }
    .services-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
    }
    .service-card {
      background: var(--bg);
      padding: 3rem 2.5rem;
      transition: background 0.3s;
      position: relative;
      overflow: hidden;
    }
    .service-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--gold);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s ease;
    }
    .service-card:hover { background: var(--surface); }
    .service-card:hover::before { transform: scaleX(1); }
    .service-num {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--gold);
      letter-spacing: 0.16em;
      margin-bottom: 1.5rem;
    }
    .service-title {
      font-family: var(--font-display);
      font-size: 1.6rem;
      letter-spacing: 0.06em;
      color: var(--white);
      margin-bottom: 1rem;
    }
    .service-desc { font-size: 0.88rem; color: var(--muted); line-height: 1.7; }

    /* ─── APPROACH ───────────────────────────────────────── */
    #approach {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8rem;
      align-items: start;
    }
    .approach-left .section-title { margin-bottom: 1.5rem; }
    .approach-body { font-size: 0.95rem; color: var(--muted); line-height: 1.85; margin-bottom: 1.5rem; }
    .approach-steps { list-style: none; margin-top: 3rem; }
    .approach-steps li {
      display: flex;
      gap: 1.5rem;
      align-items: flex-start;
      padding: 1.5rem 0;
      border-bottom: 1px solid var(--border);
    }
    .step-num {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--gold);
      letter-spacing: 0.12em;
      margin-top: 0.1rem;
      min-width: 2ch;
    }
    .step-text strong {
      font-family: var(--font-body);
      font-weight: 500;
      color: var(--white);
      font-size: 0.9rem;
      display: block;
      margin-bottom: 0.3rem;
    }
    .step-text p { font-size: 0.83rem; color: var(--muted); }

    /* ─── CONTACT ────────────────────────────────────────── */
    #contact {
      text-align: center;
      padding: 10rem 4rem;
      border-top: 1px solid var(--border);
    }
    #contact .section-label { text-align: center; }
    #contact .section-title { text-align: center; margin-bottom: 1.5rem; }
    .contact-sub {
      font-size: 0.95rem;
      color: var(--muted);
      max-width: 44ch;
      margin: 0 auto 3rem;
      line-height: 1.75;
    }
    .contact-email {
      font-family: var(--font-display);
      font-size: clamp(1.5rem, 3vw, 2.8rem);
      letter-spacing: 0.06em;
      color: var(--gold);
      text-decoration: none;
      transition: opacity 0.2s;
      display: inline-block;
    }
    .contact-email:hover { opacity: 0.7; }

    /* ─── FOOTER ─────────────────────────────────────────── */
    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2rem 4rem;
      border-top: 1px solid var(--border);
    }
    .footer-copy { font-family: var(--font-mono); font-size: 0.65rem; color: var(--muted); letter-spacing: 0.1em; }
    .footer-links { display: flex; gap: 2rem; list-style: none; }
    .footer-links a {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.1em;
      transition: color 0.2s;
    }
    .footer-links a:hover { color: var(--gold); }

    /* ─── ANIMATIONS ─────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* ─── RESPONSIVE ─────────────────────────────────────── */
    @media (max-width: 900px) {
      nav { padding: 1.2rem 2rem; }
      .nav-links { display: none; }
      section, #stats, footer { padding: 4rem 2rem; }
      #hero { padding: 0 2rem; }
      #stats { grid-template-columns: 1fr 1fr; }
      .services-grid { grid-template-columns: 1fr; }
      #approach { grid-template-columns: 1fr; gap: 3rem; }
      .hero-logo-large { display: none; }
      #contact { padding: 6rem 2rem; }
    }
  </style>
</head>
<body>

    <nav id="nav">

    /* ── LANGUAGE SWITCHER ──────────────────────────────── */
    let currentLang = 'de';

    function setLang(lang) {
      currentLang = lang;
      const t = i18n[lang];

      // Plain text elements
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key] !== undefined) el.textContent = t[key];
      });

      // HTML elements (headline with <br> and <em>)
      document.querySelectorAll('[data-i18n-html]').forEach(el => {
        const key = el.getAttribute('data-i18n-html');
        if (t[key] !== undefined) el.innerHTML = t[key];
      });

      // Toggle button active state
      document.getElementById('btn-de').classList.toggle('active', lang === 'de');
      document.getElementById('btn-en').classList.toggle('active', lang === 'en');

      // Update html lang attribute
      document.documentElement.lang = lang;
    }

    // Init with German on load
    setLang('de');

    /* ── CANVAS BACKGROUND ──────────────────────────────── */
    (function () {
      const canvas = document.getElementById('bg-canvas');
      const ctx = canvas.getContext('2d');
      let W, H, nodes = [];
      const NODE_COUNT = 60;
      const GOLD = 'rgba(201,168,76,';

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }

      function initNodes() {
        nodes = [];
        for (let i = 0; i < NODE_COUNT; i++) {
          nodes.push({
            x:  Math.random() * W,
            y:  Math.random() * H,
            vx: (Math.random() - 0.5) * 0.3,
            vy: (Math.random() - 0.5) * 0.3,
            r:  Math.random() * 1.5 + 0.5,
          });
        }
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);
        ctx.strokeStyle = 'rgba(201,168,76,0.04)';
        ctx.lineWidth = 1;
        const grid = 80;
        for (let x = 0; x < W; x += grid) {
          ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
        }
        for (let y = 0; y < H; y += grid) {
          ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
        }
        nodes.forEach(n => {
          n.x += n.vx; n.y += n.vy;
          if (n.x < 0 || n.x > W) n.vx *= -1;
          if (n.y < 0 || n.y > H) n.vy *= -1;
        });
        for (let i = 0; i < nodes.length; i++) {
          for (let j = i + 1; j < nodes.length; j++) {
            const dx = nodes[i].x - nodes[j].x;
            const dy = nodes[i].y - nodes[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 160) {
              ctx.beginPath();
              ctx.strokeStyle = GOLD + ((1 - dist / 160) * 0.25) + ')';
              ctx.lineWidth = 0.6;
              ctx.moveTo(nodes[i].x, nodes[i].y);
              ctx.lineTo(nodes[j].x, nodes[j].y);
              ctx.stroke();
            }
          }
        }
        nodes.forEach(n => {
          ctx.beginPath();
          ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
          ctx.fillStyle = GOLD + '0.5)';
          ctx.fill();
        });
        requestAnimationFrame(draw);
      }

      window.addEventListener('resize', () => { resize(); initNodes(); });
      resize();
      initNodes();
      draw();
    })();

    /* ── NAV SCROLL ─────────────────────────────────────── */
    const nav = document.getElementById('nav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 60);
    });

    /* ── REVEAL ON SCROLL ───────────────────────────────── */
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((e, i) => {
        if (e.isIntersecting) {
          setTimeout(() => e.target.classList.add('visible'), i * 80);
          observer.unobserve(e.target);
        }
      });
    }, { threshold: 0.12 });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  </script>
